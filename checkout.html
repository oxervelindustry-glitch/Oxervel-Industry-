<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Oxervel | Checkout</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #f5f0ea;
      min-height: 100vh;
    }

    .icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 1.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .checkout-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    .checkout-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .checkout-header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #4a3422;
      margin-bottom: 6px;
    }

    .checkout-header p {
      color: #8b7358;
      font-size: 13px;
    }

    .checkout-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 24px;
    }

    .card {
      background: white;
      border-radius: 24px;
      border: 1px solid #e5dcd0;
      overflow: hidden;
    }

    .card-header {
      padding: 18px 20px;
      border-bottom: 1px solid #efe8df;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: #4a3422;
    }

    .card-body {
      padding: 20px;
    }

    .product-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #efe8df;
    }

    .product-name {
      font-weight: 600;
      color: #4a3422;
      font-size: 14px;
    }

    .product-price {
      font-weight: 700;
      color: #4a3422;
      font-size: 16px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      font-size: 13px;
      color: #8b7358;
    }

    .grand-total {
      font-weight: 700;
      font-size: 18px;
      color: #4a3422;
      border-top: 1px solid #efe8df;
      margin-top: 8px;
      padding-top: 12px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #4a3422;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e5dcd0;
      border-radius: 16px;
      font-size: 13px;
      background: white;
      outline: none;
      transition: all 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #c9b9a6;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 70px;
    }

    .payment-methods {
      margin: 20px 0 16px;
    }

    .payment-methods h3 {
      font-size: 12px;
      font-weight: 600;
      color: #4a3422;
      margin-bottom: 12px;
    }

    .payment-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border: 1.5px solid #e5dcd0;
      border-radius: 20px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
    }

    .payment-option:hover {
      border-color: #b48c5c;
      background: #fefcf9;
    }

    .payment-option.selected {
      border-color: #4a3422;
      background: #faf7f2;
    }

    .payment-option input[type="radio"] {
      width: 16px;
      height: 16px;
      accent-color: #4a3422;
      cursor: pointer;
    }

    .payment-option label {
      font-size: 13px;
      font-weight: 500;
      color: #4a3422;
      cursor: pointer;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .confirm-btn {
      width: 100%;
      background: #4a3422;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .confirm-btn:hover {
      background: #3a281a;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      color: #8b7358;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
    }

    .back-link:hover {
      color: #4a3422;
    }

    .upi-pay-btn {
      width: 100%;
      background: #1a73e8;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      transition: all 0.2s;
    }

    .upi-pay-btn:hover {
      background: #0d5bbf;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #4a3422;
      color: white;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 12px;
      z-index: 1000;
      animation: fadeInOut 2s ease;
    }

    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateY(20px); }
      15% { opacity: 1; transform: translateY(0); }
      85% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(20px); }
    }

    @media (max-width: 768px) {
      .checkout-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }
      .checkout-container {
        padding: 20px 16px 40px;
      }
      .checkout-header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
<div class="checkout-container">
  <div class="checkout-header">
    <h1>Complete Your Order</h1>
    <p>Secure checkout • Free shipping</p>
  </div>

  <div class="checkout-grid">
    <!-- Order Summary -->
    <div class="card">
      <div class="card-header">
        <svg class="icon" viewBox="0 0 24 24">
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
        </svg>
        <h2>Order Summary</h2>
      </div>
      <div class="card-body">
        <div class="product-row">
          <span class="product-name" id="productName">Oxervel Floor Cleaner</span>
          <span class="product-price" id="productPrice">₹129</span>
        </div>
        <div class="total-row">
          <span>Subtotal</span>
          <span id="subtotal">₹129</span>
        </div>
        <div class="total-row">
          <span>Shipping</span>
          <span>Free</span>
        </div>
        <div class="total-row grand-total">
          <span>Total</span>
          <span id="grandTotal">₹129</span>
        </div>
      </div>
    </div>

    <!-- Payment & Shipping -->
    <div class="card">
      <div class="card-header">
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <h2>Shipping Details</h2>
      </div>
      <div class="card-body">
        <div class="form-group">
          <label>Full name</label>
          <input type="text" id="fullName" placeholder="Enter full name">
        </div>
        <div class="form-group">
          <label>Phone number</label>
          <input type="tel" id="phone" placeholder="Enter phone number">
        </div>
        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="email" placeholder="Enter email address">
        </div>
        <div class="form-group">
          <label>Delivery address</label>
          <textarea id="address" placeholder="Enter complete address with pin code"></textarea>
        </div>

        <div class="payment-methods">
          <h3>Select Payment Method</h3>
          
          <!-- UPI Option -->
          <div class="payment-option" data-method="upi">
            <input type="radio" name="paymentMethod" value="UPI / GPay / PhonePe" id="upi">
            <label for="upi">
              <svg class="icon" viewBox="0 0 24 24" width="16" height="16">
                <rect x="2" y="5" width="20" height="14" rx="2" ry="2"/>
                <line x1="8" y1="12" x2="16" y2="12"/>
              </svg>
              UPI / Google Pay / PhonePe
            </label>
          </div>
          
          <!-- COD Option -->
          <div class="payment-option" data-method="cod">
            <input type="radio" name="paymentMethod" value="Cash on Delivery" id="cod">
            <label for="cod">
              <svg class="icon" viewBox="0 0 24 24" width="16" height="16">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              Cash on Delivery (Pay at delivery)
            </label>
          </div>
        </div>

        <!-- UPI Pay Button (shows when UPI selected) -->
        <button class="upi-pay-btn" id="upiPayBtn" style="display: none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
            <path d="M3 10h18M6 10v7M18 10v7M5 5h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"/>
          </svg>
          Pay via UPI
        </button>

        <button class="confirm-btn" id="confirmOrderBtn">
          <svg class="icon" viewBox="0 0 24 24">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Confirm Order
        </button>
        <a href="order.html" class="back-link">
          <svg class="icon" viewBox="0 0 24 24">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
          Back to product
        </a>
      </div>
    </div>
  </div>
</div>

<script>
  // ========== UPI CONFIG ==========
  const UPI_ID = "8081865350-3@ybl";
  const PHONE = "8081865350";
  const NAME = "Oxervel Industry";

  // ========== TELEGRAM & GOOGLE SHEETS CONFIG ==========
  const BOT_TOKEN = "8767268068:AAFjJ2vreTe4YxdANS1cRmIatjxLNocCRf8";
  const CHAT_ID = "8128967581";
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfcybybJMvArMcPyUaSjPDQn1RWBmM1Y4kzZ6djxjpBHTD8uaJXQK4zqLiHoX/exec";

  // UPI Payment Function
  function payViaUPI(amount, orderId) {
    const note = `Order ${orderId} - Oxervel`;
    const upiUrl = `upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(NAME)}&am=${amount}&cu=INR&tn=${encodeURIComponent(note)}`;
    window.location.href = upiUrl;
  }

  // Telegram notification
  async function sendTelegramNotification(orderData) {
    const message = `🆕 *NEW ORDER* 🛍️\n\n▫️ *Order ID:* ${orderData.orderNumber}\n▫️ *Customer:* ${orderData.customerName}\n▫️ *Phone:* ${orderData.customerPhone}\n▫️ *Address:* ${orderData.address}\n▫️ *Product:* ${orderData.productName}\n▫️ *Total:* ₹${orderData.total}\n▫️ *Payment:* ${orderData.paymentMethod}\n▫️ *Time:* ${new Date().toLocaleString()}\n\n🙏 Thank you!`;
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;
    try { await fetch(url); console.log("✅ Telegram sent"); } catch(e) { console.log("❌ Telegram error"); }
  }

  // Save to Google Sheets
  async function saveToGoogleSheets(orderData) {
    const data = {
      orderId: orderData.orderNumber,
      customerName: orderData.customerName,
      phone: orderData.customerPhone,
      address: orderData.address,
      productName: orderData.productName,
      quantity: 1,
      price: orderData.total,
      total: orderData.total,
      paymentMethod: orderData.paymentMethod
    };
    try {
      await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
      console.log("✅ Saved to Google Sheets");
    } catch(e) { console.log("❌ Google Sheets error"); }
  }

  // Save to Local Storage
  function saveToLocalStorage(orderData) {
    const record = {
      orderId: orderData.orderNumber,
      customerName: orderData.customerName,
      phone: orderData.customerPhone,
      address: orderData.address,
      productName: orderData.productName,
      quantity: 1,
      price: orderData.total,
      total: orderData.total,
      paymentMethod: orderData.paymentMethod,
      status: "Processing",
      dateTime: new Date().toLocaleString()
    };
    const existing = localStorage.getItem('oxervel_orders');
    let orders = existing ? JSON.parse(existing) : [];
    orders.unshift({ ...record, id: Date.now() });
    localStorage.setItem('oxervel_orders', JSON.stringify(orders));
    localStorage.setItem('pendingOrderRecord', JSON.stringify(record));
    console.log("✅ Saved to Local Storage");
  }

  function showToast(msg) {
    let toast = document.getElementById('toast');
    if (!toast) { toast = document.createElement('div'); toast.id = 'toast'; document.body.appendChild(toast); }
    toast.innerText = msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2000);
  }

  // Load product details
  let selectedProduct = { name: "Oxervel Floor Cleaner", price: 129 };
  try {
    const checkoutProduct = localStorage.getItem('checkoutProduct');
    if (checkoutProduct) {
      const productData = JSON.parse(checkoutProduct);
      selectedProduct.name = productData.name || "Oxervel Floor Cleaner";
      selectedProduct.price = parseInt(productData.price) || 129;
    }
  } catch(e) {}

  document.getElementById('productName').innerText = selectedProduct.name;
  document.getElementById('productPrice').innerText = `₹${selectedProduct.price}`;
  document.getElementById('subtotal').innerText = `₹${selectedProduct.price}`;
  document.getElementById('grandTotal').innerText = `₹${selectedProduct.price}`;

  // Payment selection
  const paymentOptions = document.querySelectorAll('.payment-option');
  const upiPayBtn = document.getElementById('upiPayBtn');
  const confirmBtn = document.getElementById('confirmOrderBtn');

  paymentOptions.forEach(option => {
    const radio = option.querySelector('input[type="radio"]');
    option.addEventListener('click', () => {
      paymentOptions.forEach(opt => opt.classList.remove('selected'));
      option.classList.add('selected');
      radio.checked = true;
      
      // Show/hide UPI pay button
      if (radio.value.includes('UPI')) {
        upiPayBtn.style.display = 'flex';
      } else {
        upiPayBtn.style.display = 'none';
      }
    });
    if (radio.checked) {
      option.classList.add('selected');
      if (radio.value.includes('UPI')) upiPayBtn.style.display = 'flex';
    }
  });

  // Set default COD selected
  document.getElementById('cod').checked = true;
  document.querySelector('[data-method="cod"]').classList.add('selected');
  upiPayBtn.style.display = 'none';

  // UPI Pay Button Click
  upiPayBtn.addEventListener('click', () => {
    const amount = selectedProduct.price;
    const orderId = `OX${Date.now()}`;
    payViaUPI(amount, orderId);
    showToast(`Opening UPI app... Please pay ₹${amount}`);
  });

  // Confirm Order
  document.getElementById('confirmOrderBtn').addEventListener('click', async () => {
    const fullName = document.getElementById('fullName').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('email').value.trim();
    const address = document.getElementById('address').value.trim();

    if (!fullName) { alert('Please enter your full name'); return; }
    if (!phone) { alert('Please enter your phone number'); return; }
    if (!email) { alert('Please enter your email address'); return; }
    if (!address) { alert('Please enter your delivery address'); return; }

    const selectedPayment = document.querySelector('input[name="paymentMethod"]:checked');
    const paymentMethod = selectedPayment ? selectedPayment.value : 'Cash on Delivery';

    const orderData = {
      id: `ORD-${Date.now()}`,
      orderNumber: `OX${Math.floor(Math.random() * 100000)}`,
      date: new Date().toISOString(),
      total: selectedProduct.price,
      status: "Processing",
      productName: selectedProduct.name,
      paymentMethod: paymentMethod,
      address: address,
      customerName: fullName,
      customerPhone: phone,
      customerEmail: email
    };

    saveToLocalStorage(orderData);
    await sendTelegramNotification(orderData);
    await saveToGoogleSheets(orderData);
    
    if (window.FinoraAPI && typeof window.FinoraAPI.addOrder === 'function') {
      window.FinoraAPI.addOrder(orderData);
    }
    
    localStorage.removeItem('checkoutProduct');
    localStorage.removeItem('pendingOrder');
    
    showToast(`Order confirmed • ${orderData.orderNumber}`);
    
    if (paymentMethod.includes('UPI')) {
      alert(`✅ ORDER CONFIRMED!\n\nOrder ID: ${orderData.orderNumber}\nProduct: ${selectedProduct.name}\nTotal: ₹${selectedProduct.price}\nPayment: ${paymentMethod}\n\n⚠️ IMPORTANT: Please complete UPI payment using the app.\n\nYour order will be processed after payment confirmation.\n\nYour order will be delivered within 3-5 business days.`);
    } else {
      alert(`✅ ORDER CONFIRMED!\n\nOrder ID: ${orderData.orderNumber}\nProduct: ${selectedProduct.name}\nTotal: ₹${selectedProduct.price}\nPayment: ${paymentMethod}\n\nYour order will be delivered within 3-5 business days.\n\nPay ₹${selectedProduct.price} at delivery.`);
    }
    
    window.location.href = 'account.html';
  });
</script>
</body>
  </html>
