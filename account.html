<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Oxervel Industry | My Account</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  body {
    background: #f5f0ea;
    min-height: 100vh;
  }

  .icon {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    stroke-width: 1.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .login-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f0ea;
    padding: 20px;
  }

  .login-card {
    background: white;
    border-radius: 28px;
    padding: 36px 28px;
    text-align: center;
    max-width: 360px;
    width: 100%;
    border: 1px solid #e5dcd0;
    box-shadow: 0 4px 16px rgba(0,0,0,0.03);
  }

  .login-card .logo {
    width: 80px;
    margin-bottom: 20px;
  }

  .login-card h2 {
    color: #4a3422;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .login-card p {
    color: #8b7358;
    font-size: 13px;
    margin-bottom: 24px;
  }

  .google-btn {
    background: white;
    border: 1.5px solid #e0d5c8;
    border-radius: 48px;
    padding: 10px 16px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: #4a3422;
    transition: all 0.2s;
  }

  .google-btn:hover {
    background: #faf7f2;
    border-color: #c9b9a6;
  }

  .dashboard {
    display: none;
    min-height: 100vh;
    background: #f5f0ea;
  }

  .navbar {
    background: white;
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    border-bottom: 1px solid #e5dcd0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-area img {
    height: 34px;
  }

  .logo-area span {
    font-weight: 600;
    font-size: 18px;
    color: #4a3422;
  }

  .nav-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .shop-btn {
    background: #4a3422;
    color: white;
    border: none;
    padding: 6px 16px;
    border-radius: 40px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }

  .shop-btn:hover {
    background: #3a281a;
  }

  .user-info {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #f5f0ea;
    padding: 4px 12px 4px 6px;
    border-radius: 40px;
  }

  .user-info img {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    object-fit: cover;
  }

  .user-info span {
    font-size: 12px;
    font-weight: 500;
    color: #4a3422;
  }

  .menu-btn {
    background: transparent;
    border: 1.5px solid #e0d5c8;
    border-radius: 40px;
    padding: 6px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    color: #4a3422;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s;
  }

  .menu-btn:hover {
    background: #faf7f2;
  }

  .dropdown {
    position: relative;
  }

  .dropdown-menu {
    display: none;
    position: absolute;
    right: 0;
    top: 42px;
    background: white;
    border-radius: 18px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    border: 1px solid #e5dcd0;
    min-width: 140px;
    z-index: 200;
    overflow: hidden;
  }

  .dropdown-menu.show {
    display: block;
  }

  .dropdown-menu a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    color: #4a3422;
    font-size: 12px;
    cursor: pointer;
    border-bottom: 1px solid #f0eae2;
    transition: background 0.15s;
  }

  .dropdown-menu a:last-child {
    border-bottom: none;
  }

  .dropdown-menu a:hover {
    background: #faf7f2;
  }

  .main-content {
    max-width: 1000px;
    margin: 0 auto;
    padding: 28px 20px;
  }

  .welcome-card {
    background: white;
    border-radius: 24px;
    padding: 24px 28px;
    margin-bottom: 28px;
    border: 1px solid #e5dcd0;
  }

  .welcome-card h1 {
    font-size: 22px;
    font-weight: 600;
    color: #4a3422;
    margin-bottom: 6px;
  }

  .welcome-card p {
    font-size: 13px;
    color: #8b7358;
  }

  .orders-card {
    background: white;
    border-radius: 24px;
    padding: 24px;
    border: 1px solid #e5dcd0;
  }

  .orders-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid #efe8df;
  }

  .orders-header h2 {
    font-size: 16px;
    font-weight: 600;
    color: #4a3422;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .orders-header span {
    background: #f5f0ea;
    padding: 2px 10px;
    border-radius: 30px;
    font-size: 11px;
    color: #4a3422;
  }

  .order-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .order-item {
    background: #fefcf9;
    border-radius: 18px;
    border: 1px solid #ede6dc;
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    transition: all 0.2s;
  }

  .order-item:hover {
    background: white;
    border-color: #d9cebf;
  }

  .order-info {
    flex: 2;
  }

  .order-id {
    font-weight: 600;
    color: #4a3422;
    font-size: 14px;
    margin-bottom: 6px;
  }

  .order-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    font-size: 11px;
    color: #8b7358;
  }

  .order-meta span {
    background: #f5f0ea;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .order-status {
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 11px;
    font-weight: 500;
  }

  .status-processing {
    background: #fff1e6;
    color: #b45f1b;
  }

  .status-delivered {
    background: #e8f3ed;
    color: #2a7a4b;
  }

  .order-amount {
    font-weight: 700;
    font-size: 16px;
    color: #4a3422;
    min-width: 80px;
    text-align: right;
  }

  .empty-orders {
    text-align: center;
    padding: 48px 20px;
    color: #b8a48c;
  }

  .empty-icon {
    width: 48px;
    height: 48px;
    margin: 0 auto 12px;
    stroke: #d4c2b0;
    stroke-width: 1.2;
  }

  footer {
    text-align: center;
    padding: 20px;
    color: #b8a48c;
    font-size: 10px;
    border-top: 1px solid #e5dcd0;
    margin-top: 28px;
  }

  @media (max-width: 640px) {
    .navbar { flex-direction: column; align-items: stretch; }
    .nav-controls { justify-content: space-between; }
    .order-item { flex-direction: column; align-items: stretch; }
    .order-amount { text-align: left; }
    .welcome-card h1 { font-size: 18px; }
  }
</style>
</head>
<body>

<!-- Login Section -->
<div id="loginSection" class="login-container">
  <div class="login-card">
    <img src="logo.jpg" class="logo" alt="Oxervel Industry" onerror="this.src='https://placehold.co/80x50?text=OX'">
    <h2>Welcome</h2>
    <p>Sign in to view your orders</p>
    <button class="google-btn" id="loginBtn">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="dashboard">
  <nav class="navbar">
    <div class="logo-area">
      <img src="logo.jpg" alt="Oxervel Industry" onerror="this.src='https://placehold.co/40x40?text=OX'">
      <span>Oxervel Industry</span>
    </div>
    <div class="nav-controls">
      <button class="shop-btn" id="shopBtn">
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        Shop
      </button>
      <div class="user-info" id="userInfo">
        <img id="userAvatar" src="" alt="">
        <span id="userName">Customer</span>
      </div>
      <div class="dropdown">
        <button class="menu-btn" id="menuBtn">
          <svg class="icon" viewBox="0 0 24 24">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
          Menu
        </button>
        <div class="dropdown-menu" id="dropdownMenu">
          <a id="settingsBtn">
            <svg class="icon" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            Settings
          </a>
          <a id="logoutBtn">
            <svg class="icon" viewBox="0 0 24 24">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Logout
          </a>
        </div>
      </div>
    </div>
  </nav>

  <div class="main-content">
    <div class="welcome-card">
      <h1 id="welcomeName">My Orders</h1>
      <p>View and track your order history</p>
    </div>

    <div class="orders-card">
      <div class="orders-header">
        <h2>
          <svg class="icon" viewBox="0 0 24 24">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
          Recent Orders
        </h2>
        <span id="orderCount">0 orders</span>
      </div>
      <div id="ordersList" class="order-list">
        <div class="empty-orders">
          <svg class="empty-icon" viewBox="0 0 24 24">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
          <p>No orders yet</p>
          <p style="font-size:11px; margin-top:6px;">Complete a booking to see it here</p>
        </div>
      </div>
    </div>
  </div>

  <footer>© 2026 Oxervel Industry — Customer Dashboard</footer>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgAgAdZzQ4A0Z0B3hIdEGlFJezjh_SSjU",
  authDomain: "oxervel-industry-2038f.firebaseapp.com",
  projectId: "oxervel-industry-2038f",
  storageBucket: "oxervel-industry-2038f.firebasestorage.app",
  messagingSenderId: "226740400468",
  appId: "1:226740400468:web:e006a50579874e88d798c1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const loginSection = document.getElementById('loginSection');
const dashboard = document.getElementById('dashboard');
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const shopBtn = document.getElementById('shopBtn');
const settingsBtn = document.getElementById('settingsBtn');
const menuBtn = document.getElementById('menuBtn');
const dropdownMenu = document.getElementById('dropdownMenu');

function setLoginFlag(user) {
  localStorage.setItem('finora_user_logged_in', user ? 'true' : 'false');
}

function getUserOrdersKey(uid) { return `finora_orders_${uid}`; }

function loadOrders(uid) {
  const stored = localStorage.getItem(getUserOrdersKey(uid));
  return stored ? JSON.parse(stored) : [];
}

function saveOrders(uid, orders) {
  localStorage.setItem(getUserOrdersKey(uid), JSON.stringify(orders));
}

function renderOrders(uid) {
  const orders = loadOrders(uid);
  const container = document.getElementById('ordersList');
  const countSpan = document.getElementById('orderCount');
  
  if (!container) return;
  
  if (orders.length === 0) {
    container.innerHTML = `<div class="empty-orders"><svg class="empty-icon" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg><p>No orders yet</p><p style="font-size:11px; margin-top:6px;">Complete a booking to see it here</p></div>`;
    countSpan.innerText = '0 orders';
    return;
  }
  
  countSpan.innerText = `${orders.length} order${orders.length > 1 ? 's' : ''}`;
  container.innerHTML = orders.sort((a,b) => new Date(b.date) - new Date(a.date)).map(order => `
    <div class="order-item">
      <div class="order-info">
        <div class="order-id">${escapeHtml(order.orderNumber)}</div>
        <div class="order-meta">
          <span>${new Date(order.date).toLocaleDateString()}</span>
          <span>${escapeHtml(order.productName)}</span>
          <span>${escapeHtml(order.paymentMethod)}</span>
        </div>
      </div>
      <div class="order-status ${order.status === 'Delivered' ? 'status-delivered' : 'status-processing'}">${order.status === 'Delivered' ? 'Delivered' : 'Processing'}</div>
      <div class="order-amount">₹${order.total.toFixed(2)}</div>
    </div>
  `).join('');
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function addOrderToUser(uid, orderDetails) {
  const orders = loadOrders(uid);
  orders.unshift({
    id: orderDetails.id || Date.now(),
    orderNumber: orderDetails.orderNumber || `OX-${Date.now()}`,
    date: orderDetails.date || new Date().toISOString(),
    total: Number(orderDetails.total) || 0,
    status: orderDetails.status || "Processing",
    productName: orderDetails.productName || "Floor Cleaner",
    paymentMethod: orderDetails.paymentMethod || "Not specified"
  });
  saveOrders(uid, orders);
  renderOrders(uid);
  return true;
}

function checkCompletedOrder(user) {
  const completed = localStorage.getItem('completedOrder');
  if (completed && user) {
    try { addOrderToUser(user.uid, JSON.parse(completed)); localStorage.removeItem('completedOrder'); } catch(e) {}
  }
}

window.FinoraAPI = {
  addOrder: (order) => {
    const user = auth.currentUser;
    if (user && user.uid) return addOrderToUser(user.uid, order);
    localStorage.setItem('pendingOrderForLater', JSON.stringify(order));
    return false;
  }
};

function onLogin(user) {
  loginSection.style.display = 'none';
  dashboard.style.display = 'block';
  setLoginFlag(user);
  document.getElementById('userAvatar').src = user.photoURL || `https://ui-avatars.com/api/?background=4a3422&color=fff&name=${user.displayName?.[0] || 'U'}`;
  document.getElementById('userName').innerText = user.displayName?.split(' ')[0] || 'Customer';
  document.getElementById('welcomeName').innerHTML = `Hello, ${user.displayName?.split(' ')[0] || 'Customer'}`;
  renderOrders(user.uid);
  checkCompletedOrder(user);
}

function onLogout() {
  loginSection.style.display = 'flex';
  dashboard.style.display = 'none';
  setLoginFlag(null);
}

loginBtn.onclick = () => signInWithPopup(auth, provider).catch(err => alert('Login failed: ' + err.message));
shopBtn.onclick = () => window.location.href = 'index.html';
settingsBtn.onclick = () => alert('Settings');
logoutBtn.onclick = () => signOut(auth);
menuBtn.onclick = (e) => { e.stopPropagation(); dropdownMenu.classList.toggle('show'); };
document.addEventListener('click', () => dropdownMenu.classList.remove('show'));

onAuthStateChanged(auth, (user) => user ? onLogin(user) : onLogout());
</script>
</body>
        </html>
